sim/controller_manager:
  ros__parameters:
    update_rate: 500

    joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

sim/joint_trajectory_controller:
  ros__parameters:
    gains:
      rod_0_to_dynamic_stabilizer_0_joint: {p: 70.0, i: 0.1, d: 85.0}
      rod_1_to_dynamic_stabilizer_1_joint: {p: 70.0, i: 0.1, d: 85.0}
      rod_2_to_dynamic_stabilizer_2_joint: {p: 70.0, i: 0.1, d: 85.0}
    joints:
      - rod_0_to_dynamic_stabilizer_0_joint
      - rod_1_to_dynamic_stabilizer_1_joint
      - rod_2_to_dynamic_stabilizer_2_joint

    command_interfaces:
      - effort

    state_interfaces:
      - position
      - velocity
      
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false